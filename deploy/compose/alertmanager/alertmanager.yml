global:
  resolve_timeout: 5m
  smtp_smarthost: ''
  smtp_from: ''
  smtp_require_tls: true

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'tenant_id', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h
      
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 30s
      repeat_interval: 4h
      
    - match:
        category: cardinality
      receiver: 'cardinality-receiver'
      group_wait: 1m
      repeat_interval: 12h

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://platform-api:8080/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://platform-api:8080/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://platform-api:8080/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'cardinality-receiver'
    webhook_configs:
      - url: 'http://platform-api:8080/api/v1/alerts/webhook'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'tenant_id']
    
  - source_match:
      alertname: 'HighTotalSeriesCritical'
    target_match:
      alertname: 'HighTotalSeries'
    equal: []

# 本地观测栈 + demo 应用 + 故障注入容器
# 用法：在仓库根目录执行
#   docker compose -f deploy/compose/docker-compose.yml up -d --build
# 故障注入（独立一次性任务，需 profile inject，避免与 run 容器名冲突）：
#   docker compose -f deploy/compose/docker-compose.yml --profile inject run --rm fault-injector /scripts/inject.sh demo

services:
  mysql:
    profiles: ["mysql"]
    image: mysql:8.0
    container_name: obs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: obs_root
      MYSQL_DATABASE: obs_platform
      MYSQL_USER: obs
      MYSQL_PASSWORD: obs
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pobs_root"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: obs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - obs
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  checkout-sim:
    build:
      context: ../..
      dockerfile: demo-apps/checkout-sim/Dockerfile
    container_name: obs-checkout-sim
    environment:
      CHAOS_TOKEN: dev-chaos-token
    ports:
      - "18080:18080"
    networks:
      - obs

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.105.0
    container_name: obs-victoriametrics
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=90d
      - -maxLabelsPerSeries=30
      - -maxSeriesPerQuery=10000
      - -maxSamplesPerQuery=10000000
      - -memory.allowedPercent=80
      - -search.maxSeries=100000
      - -search.maxPointsPerTimeseries=30000
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/storage
    networks:
      - obs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8428/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: obs-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=1d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../configs/prometheus-rules:/etc/prometheus/rules:ro
    networks:
      - obs
    depends_on:
      - checkout-sim
      - victoriametrics

  loki:
    image: grafana/loki:2.9.8
    container_name: obs-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - obs

  promtail:
    image: grafana/promtail:2.9.8
    container_name: obs-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    networks:
      - obs
    depends_on:
      - loki
      - checkout-sim

  grafana:
    image: grafana/grafana:11.3.1
    container_name: obs-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - obs
    depends_on:
      - prometheus
      - loki

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: obs-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://localhost:9093
      - --cluster.listen-address=
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - obs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  platform-api:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    container_name: obs-platform-api
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/configs/config.docker.yaml
    volumes:
      - ../../configs:/app/configs:ro
    networks:
      - obs
    depends_on:
      - redis
      - prometheus
      - alertmanager
      - victoriametrics
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  asynqmon:
    image: hibiken/asynqmon:latest
    container_name: obs-asynqmon
    ports:
      - "8081:8080"
    environment:
      - REDIS_ADDR=redis:6379
    networks:
      - obs
    depends_on:
      - redis

  fault-injector:
    profiles: ["inject"]
    build: ./fault-injector
    environment:
      CHECKOUT_URL: http://checkout-sim:18080
      CHAOS_TOKEN: dev-chaos-token
    networks:
      - obs
    depends_on:
      - checkout-sim

networks:
  obs:
    driver: bridge

volumes:
  mysql_data:
  grafana_data:
  vm_data:
  alertmanager_data:
  redis_data:

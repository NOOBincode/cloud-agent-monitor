apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
    jsonData:
      httpMethod: POST

  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      customQueryParameters: 'tenant_id=default'

  - name: VictoriaTraces
    type: tempo
    access: proxy
    url: http://victoriatraces:9480
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: victorialogs
      serviceMap:
        datasourceUid: victoriametrics

  - name: VictoriaLogs
    type: victorialogs-datasource
    access: proxy
    url: http://victorialogs:9428
    uid: victorialogs
    editable: false
    jsonData:
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false

  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: false
    jsonData:
      implementation: prometheus